greeting:
  profile: dev
quarkus:
  application:
    name: odin-gateway
    version: ${project.version}
  oidc:
    client-id: bifrost-service
    credentials:
      secret: ${OIDC_CLIENT_SECRET:io6noq6BHaim7BQhwVNqz8N2r9qhbWbO}
    auth-server-url: https://keycloak.rebiip.com.br/realms/heimdall
    application-type: service
  keycloak:
    policy-enforcer:
      enabled: true
      enforcement-mode: ENFORCING
      paths:
        health:
          name: health
          paths: [ "/q/health", "/q/health/*" ]
          enforcement-mode: disabled
        preflight:
          name: preflight
          paths: [ "/*" ]
          methods:
            options:
              method: OPTIONS
              scopes: view
          enforcement-mode: disabled
        api:
          paths: [ "/*" ]
          methods:
            get:
              method: GET
              scopes: view
            head:
              method: HEAD
              scopes: view
            post:
              method: POST
              scopes: create
            put:
              method: PUT
              scopes: update
            patch:
              method: PATCH
              scopes: update
            delete:
              method: DELETE
              scopes: delete
  http:
    port: 2500
    read-timeout: 30M
    cors:
      enabled: true
      methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
      headers: "Content-Type, Authorization, Origin, Referer, User-Agent, Timezone"
      origins: /.*/
      access-control-allow-credentials: true
  thread-pool:
    core-threads: 10
    keep-alive-time: 1M
  log:
    level: INFO
#    category:
#      "org.keycloak":
#        level:  DEBUG
#      "io.quarkus.keycloak":
#        level: DEBUG
    console:
      format: "%n %d{yyyy-MM-dd HH:mm:ss.SSS} [%p] [%t] [ %X{user} ] %C : %s"

gateway:
  routes:
    bifrost:
      path-prefixes: [ "/bifrost" ]
      strip-prefix: true
      target:
        service-name: ${BIFROST_SERVICE_NAME:localhost}
        scheme: ${BIFROST_SCHEME:http}
        port: ${BIFROST_TARGET_PORT:${BIFROST_SERVICE_PORT:2222}}
    mimir:
      path-prefixes: [ "/mimir" ]
      strip-prefix: true
      target:
        service-name: ${MIMIR_SERVICE_NAME:localhost}
        scheme: ${MIMIR_SCHEME:http}
        port: ${MIMIR_TARGET_PORT:${MIMIR_SERVICE_PORT:2400}}
    skuld:
